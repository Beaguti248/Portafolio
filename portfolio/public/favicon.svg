<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Fondo -->
  <rect width="512" height="512" rx="112" ry="112" fill="#0f172a"/>

  <!-- Borde gradiente -->
  <rect width="512" height="512" rx="112" ry="112"
        fill="none" stroke="url(#border-grad)" stroke-width="5" opacity="0.9"/>

  <!-- Glow interior -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="url(#glow)"/>

  <!-- Texto BG -->
  <text
    x="256" y="340"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="240"
    font-weight="800"
    text-anchor="middle"
    letter-spacing="-8"
    fill="url(#text-grad)"
  >BG</text>
</svg>
